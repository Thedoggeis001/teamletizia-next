services:
  db:
    image: postgres:16-alpine
    container_name: teamletizia_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teamletizia
      POSTGRES_PASSWORD: teamletizia_dev_pw
      POSTGRES_DB: teamletizia_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamletizia -d teamletizia_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
